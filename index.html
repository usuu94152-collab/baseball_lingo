<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BaseLingo · 야구 규칙 마스터</title>
<style>
  :root {
    --bg: #0f1a14;
    --bg-card: #16241c;
    --bg-elevated: #1d3026;
    --grass: #58cc02;
    --grass-dark: #58a700;
    --grass-shadow: #4a8a02;
    --dirt: #d4a574;
    --dirt-dark: #b8895a;
    --gold: #ffc800;
    --gold-dark: #e0a800;
    --red: #ff4b4b;
    --red-dark: #e03e3e;
    --blue: #1cb0f6;
    --purple: #ce82ff;
    --text: #fff;
    --text-muted: #afafaf;
    --text-dim: #5a6b62;
    --locked: #2a3d33;
    --locked-light: #37503f;
    --border: #2a3d33;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

  /* ============ TOP BAR ============ */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--bg);
    border-bottom: 2px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 800;
    font-size: 16px;
  }

  .stat-icon {
    font-size: 22px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
  }

  .stat.streak { color: #ff9600; }
  .stat.gem { color: var(--blue); }
  .stat.hearts { color: var(--red); }

  /* ============ SECTION HEADER ============ */
  .section-header {
    margin: 16px;
    padding: 20px 24px;
    background: var(--grass);
    border-radius: 16px;
    box-shadow: 0 4px 0 var(--grass-shadow);
    color: white;
    position: relative;
    overflow: hidden;
  }

  .section-header::before {
    content: '⚾';
    position: absolute;
    right: -10px;
    bottom: -20px;
    font-size: 100px;
    opacity: 0.15;
    transform: rotate(-15deg);
  }

  .section-label {
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.85;
    margin-bottom: 4px;
  }

  .section-title {
    font-size: 22px;
    font-weight: 900;
    line-height: 1.2;
    position: relative;
    z-index: 1;
  }

  .section-progress {
    margin-top: 12px;
    height: 8px;
    background: rgba(0,0,0,0.2);
    border-radius: 4px;
    overflow: hidden;
  }

  .section-progress-bar {
    height: 100%;
    background: white;
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  /* ============ PATH ============ */
  .path {
    padding: 20px 0 100px;
    position: relative;
    max-width: 480px;
    margin: 0 auto;
  }

  .unit-divider {
    margin: 32px 16px 24px;
    text-align: center;
    position: relative;
  }

  .unit-divider::before,
  .unit-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 2px;
    background: var(--border);
  }
  .unit-divider::before { left: 0; }
  .unit-divider::after { right: 0; }

  .unit-label {
    display: inline-block;
    background: var(--bg-card);
    border: 2px solid var(--border);
    padding: 8px 18px;
    border-radius: 20px;
    font-weight: 800;
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .nodes {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 16px 0;
  }

  .node-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* zigzag positioning */
  .node-wrap[data-pos="0"] { transform: translateX(0); }
  .node-wrap[data-pos="1"] { transform: translateX(60px); }
  .node-wrap[data-pos="2"] { transform: translateX(80px); }
  .node-wrap[data-pos="3"] { transform: translateX(60px); }
  .node-wrap[data-pos="4"] { transform: translateX(0); }
  .node-wrap[data-pos="5"] { transform: translateX(-60px); }
  .node-wrap[data-pos="6"] { transform: translateX(-80px); }
  .node-wrap[data-pos="7"] { transform: translateX(-60px); }

  .node {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    cursor: pointer;
    position: relative;
    border: none;
    transition: transform 0.1s;
    color: white;
  }

  .node:active:not(:disabled) { transform: translateY(2px); }
  .node:disabled { cursor: not-allowed; }

  /* node states */
  .node.completed {
    background: var(--gold);
    box-shadow: 0 6px 0 var(--gold-dark);
  }
  .node.completed::after {
    content: '★';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 36px;
    text-shadow: 0 2px 0 var(--gold-dark);
  }

  .node.current {
    background: var(--grass);
    box-shadow: 0 6px 0 var(--grass-shadow);
    animation: bounce 1.6s infinite;
  }

  .node.locked {
    background: var(--locked);
    box-shadow: 0 6px 0 var(--bg-card);
    color: var(--text-dim);
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .node.current .pulse-ring {
    position: absolute;
    inset: -8px;
    border: 4px solid var(--grass);
    border-radius: 50%;
    opacity: 0.3;
    animation: pulse 1.6s infinite;
    pointer-events: none;
  }

  @keyframes pulse {
    0% { transform: scale(0.95); opacity: 0.5; }
    100% { transform: scale(1.15); opacity: 0; }
  }

  .start-tag {
    position: absolute;
    top: -32px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    color: var(--grass-dark);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    box-shadow: 0 2px 0 rgba(0,0,0,0.1);
  }
  .start-tag::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 50%;
    transform: translateX(-50%);
    border-left: 5px solid transparent;
    border-right: 5px solid transparent;
    border-top: 5px solid white;
  }

  /* ============ LESSON SCREEN ============ */
  .lesson {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: none;
    flex-direction: column;
  }
  .lesson.active { display: flex; }

  .lesson-header {
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .close-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 28px;
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .progress-bar {
    flex: 1;
    height: 16px;
    background: var(--bg-elevated);
    border-radius: 8px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--grass);
    border-radius: 8px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    top: 4px;
    left: 8px;
    right: 8px;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
  }

  .heart-counter {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--red);
    font-weight: 800;
  }

  .lesson-body {
    flex: 1;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .question-prompt {
    font-size: 14px;
    font-weight: 800;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .question-text {
    font-size: 24px;
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 24px;
  }

  .question-image {
    background: var(--bg-elevated);
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    font-size: 80px;
    margin-bottom: 24px;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .choice {
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-bottom-width: 4px;
    border-radius: 14px;
    padding: 16px 18px;
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    text-align: left;
    cursor: pointer;
    transition: transform 0.05s;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: inherit;
  }

  .choice:hover:not(:disabled) { background: var(--bg-elevated); }
  .choice:active:not(:disabled) { transform: translateY(2px); border-bottom-width: 2px; }

  .choice.selected {
    background: rgba(28, 176, 246, 0.15);
    border-color: var(--blue);
    color: var(--blue);
  }

  .choice.correct {
    background: rgba(88, 204, 2, 0.15);
    border-color: var(--grass);
    color: var(--grass);
  }

  .choice.wrong {
    background: rgba(255, 75, 75, 0.15);
    border-color: var(--red);
    color: var(--red);
  }

  .choice:disabled { cursor: default; }

  .choice-num {
    width: 24px;
    height: 24px;
    border: 2px solid currentColor;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    opacity: 0.6;
  }

  /* ============ FOOTER FEEDBACK ============ */
  .footer {
    padding: 16px 20px 24px;
    background: var(--bg);
  }

  .feedback {
    padding: 16px 20px;
    border-radius: 14px;
    margin-bottom: 12px;
    display: none;
  }
  .feedback.show { display: block; animation: slideUp 0.3s ease; }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .feedback.correct {
    background: rgba(88, 204, 2, 0.15);
    color: var(--grass);
  }
  .feedback.wrong {
    background: rgba(255, 75, 75, 0.15);
    color: var(--red);
  }

  .feedback-title {
    font-size: 18px;
    font-weight: 900;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .feedback-explain {
    font-size: 14px;
    font-weight: 600;
    opacity: 0.9;
    line-height: 1.4;
  }

  .check-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-size: 15px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.05s;
  }

  .check-btn.disabled {
    background: var(--locked);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  .check-btn.ready {
    background: var(--grass);
    color: white;
    box-shadow: 0 4px 0 var(--grass-shadow);
  }
  .check-btn.ready:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--grass-shadow); }

  .check-btn.continue {
    background: var(--grass);
    color: white;
    box-shadow: 0 4px 0 var(--grass-shadow);
  }
  .check-btn.continue:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--grass-shadow); }

  .check-btn.continue.wrong {
    background: var(--red);
    box-shadow: 0 4px 0 var(--red-dark);
  }

  /* ============ COMPLETION SCREEN ============ */
  .completion {
    text-align: center;
    padding: 40px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .trophy {
    font-size: 100px;
    margin-bottom: 24px;
    animation: trophy-bounce 1s ease infinite;
  }

  @keyframes trophy-bounce {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-10px) rotate(5deg); }
  }

  .completion-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .completion-sub {
    font-size: 16px;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 320px;
    margin-bottom: 32px;
  }

  .stat-card {
    border: 2px solid;
    border-radius: 14px;
    padding: 12px;
    text-align: left;
  }

  .stat-card.gold { border-color: var(--gold); }
  .stat-card.green { border-color: var(--grass); }

  .stat-card-label {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .stat-card.gold .stat-card-label { color: var(--gold); }
  .stat-card.green .stat-card-label { color: var(--grass); }

  .stat-card-value {
    font-size: 22px;
    font-weight: 900;
    color: white;
  }

  /* ============ BOTTOM NAV ============ */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-top: 2px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 8px 0;
    z-index: 40;
    max-width: 480px;
    margin: 0 auto;
  }

  .nav-item {
    flex: 1;
    background: none;
    border: none;
    padding: 8px 4px;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    border-radius: 8px;
  }

  .nav-item.active {
    color: var(--grass);
    background: rgba(88, 204, 2, 0.1);
  }

  .nav-icon { font-size: 24px; }
  .nav-label { font-size: 10px; font-weight: 800; }

  /* ============ TOAST ============ */
  .heart-loss {
    position: fixed;
    top: 50%;
    left: 50%;
    font-size: 48px;
    pointer-events: none;
    z-index: 200;
    animation: heartLoss 1.2s ease forwards;
  }

  @keyframes heartLoss {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -150%) scale(0.5); opacity: 0; }
  }

  /* tablet */
  @media (min-width: 600px) {
    .lesson-body { max-width: 600px; margin: 0 auto; width: 100%; }
    .footer > * { max-width: 600px; margin-left: auto; margin-right: auto; }
  }
</style>
</head>
<body>

<!-- ============ HOME SCREEN ============ -->
<div id="home" class="screen">
  <div class="topbar">
    <div class="stat streak">
      <span class="stat-icon">🔥</span>
      <span id="streakCount">0</span>
    </div>
    <div class="stat gem">
      <span class="stat-icon">💎</span>
      <span id="gemCount">0</span>
    </div>
    <div class="stat hearts">
      <span class="stat-icon">❤️</span>
      <span id="heartCount">5</span>
    </div>
  </div>

  <div class="section-header" id="sectionHeader">
    <div class="section-label" id="sectionLabel">섹션 1, 유닛 1</div>
    <div class="section-title" id="sectionTitle">야구장과 포지션 알기</div>
    <div class="section-progress">
      <div class="section-progress-bar" id="sectionProgressBar" style="width: 0%"></div>
    </div>
  </div>

  <div class="path" id="path"></div>
</div>

<!-- ============ LESSON SCREEN ============ -->
<div id="lesson" class="lesson">
  <div class="lesson-header">
    <button class="close-btn" onclick="exitLesson()">✕</button>
    <div class="progress-bar">
      <div class="progress-fill" id="lessonProgress" style="width: 0%"></div>
    </div>
    <div class="heart-counter">
      <span>❤️</span>
      <span id="lessonHearts">5</span>
    </div>
  </div>

  <div class="lesson-body" id="lessonBody"></div>

  <div class="footer">
    <div class="feedback" id="feedback"></div>
    <button class="check-btn disabled" id="checkBtn" onclick="handleCheck()">정답 확인</button>
  </div>
</div>

<!-- ============ BOTTOM NAV ============ -->
<div class="bottom-nav">
  <button class="nav-item active">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">학습</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">⚾</span>
    <span class="nav-label">연습</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">🏆</span>
    <span class="nav-label">랭킹</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">👤</span>
    <span class="nav-label">프로필</span>
  </button>
</div>

<script>
/* ============================================
   야구 규칙 학습 콘텐츠
============================================ */
const CURRICULUM = [
  {
    id: 'basics',
    title: '야구장과 포지션 알기',
    icon: '⚾',
    units: [
      {
        id: 'b1',
        title: '기본 용어',
        nodeIcon: '⭐',
        questions: [
          {
            type: 'mc',
            prompt: '다음 중 맞는 것을 고르세요',
            text: '타자가 공을 치고 1루까지 안전하게 가면 무엇이라고 하나요?',
            choices: ['홈런', '안타', '아웃', '볼'],
            correct: 1,
            explain: '안타(Hit)는 타자가 친 공으로 적어도 1루에 살아 나가는 것을 말해요.'
          },
          {
            type: 'mc',
            prompt: '빈 칸을 채우세요',
            text: '한 팀당 한 경기에 ___명의 선수가 수비를 합니다.',
            choices: ['7명', '8명', '9명', '10명'],
            correct: 2,
            explain: '야구는 한 팀이 9명의 선수로 수비합니다 (지명타자 제도가 있으면 공격은 9명, 수비는 9명).'
          },
          {
            type: 'mc',
            prompt: '용어 매칭',
            text: '"마운드"는 어떤 선수가 서 있는 곳인가요?',
            choices: ['포수', '투수', '유격수', '타자'],
            correct: 1,
            explain: '마운드는 투수가 공을 던지는 동그란 흙더미예요. 홈플레이트에서 18.44m 떨어져 있어요.'
          }
        ]
      },
      {
        id: 'b2',
        title: '경기장 구조',
        nodeIcon: '📖',
        questions: [
          {
            type: 'mc',
            prompt: '경기장 지식',
            text: '야구장의 베이스는 몇 개일까요?',
            choices: ['3개', '4개', '5개', '6개'],
            correct: 1,
            explain: '1루, 2루, 3루, 그리고 홈플레이트 — 총 4개의 베이스가 다이아몬드 모양으로 배치돼요.'
          },
          {
            type: 'mc',
            prompt: '용어',
            text: '"파울 라인"은 무엇을 구분하는 선인가요?',
            choices: ['공격과 수비', '페어와 파울 지역', '내야와 외야', '홈과 원정'],
            correct: 1,
            explain: '파울 라인은 페어(유효) 지역과 파울(무효) 지역을 나누는 선이에요. 홈플레이트에서 1루, 3루를 지나 외야 끝까지 이어져요.'
          }
        ]
      },
      {
        id: 'b3',
        title: '포지션 익히기',
        nodeIcon: '🎧',
        questions: [
          {
            type: 'mc',
            prompt: '포지션',
            text: '내야수가 아닌 것은?',
            choices: ['1루수', '유격수', '중견수', '3루수'],
            correct: 2,
            explain: '중견수(CF)는 외야수예요. 내야수는 1루수, 2루수, 3루수, 유격수 4명입니다.'
          },
          {
            type: 'mc',

/* ============================================
   STATE
============================================ */
let state = {
  currentSection: 0,
  progress: {}, // {sectionId: [unitIndex 완료 여부]}
  streak: 0,
  gems: 0,
  hearts: 5,
  // lesson-specific
  currentUnitId: null,
  currentQuestionIdx: 0,
  selectedChoice: null,
  isAnswered: false,
  lessonHeartsLost: 0,
  lessonGemsEarned: 0,
  correctCount: 0
};

// init progress
CURRICULUM.forEach(sec => {
  state.progress[sec.id] = sec.units.map(() => false);
});

/* ============================================
   RENDER HOME
============================================ */
function renderHome() {
  document.getElementById('streakCount').textContent = state.streak;
  document.getElementById('gemCount').textContent = state.gems;
  document.getElementById('heartCount').textContent = state.hearts;

  const section = CURRICULUM[state.currentSection];
  document.getElementById('sectionLabel').textContent = `섹션 ${state.currentSection + 1}`;
  document.getElementById('sectionTitle').textContent = section.title;

  const completed = state.progress[section.id].filter(Boolean).length;
  const total = section.units.length;
  document.getElementById('sectionProgressBar').style.width = `${(completed/total)*100}%`;

  const path = document.getElementById('path');
  path.innerHTML = '';

  CURRICULUM.forEach((sec, sIdx) => {
    if (sIdx > 0) {
      const divider = document.createElement('div');
      divider.className = 'unit-divider';
      divider.innerHTML = `<span class="unit-label">섹션 ${sIdx + 1} · ${sec.title}</span>`;
      path.appendChild(divider);
    }

    const nodes = document.createElement('div');
    nodes.className = 'nodes';

    sec.units.forEach((unit, uIdx) => {
      const wrap = document.createElement('div');
      wrap.className = 'node-wrap';
      wrap.dataset.pos = uIdx % 8;

      const completed = state.progress[sec.id][uIdx];
      const prevCompleted = uIdx === 0
        ? (sIdx === 0 ? true : state.progress[CURRICULUM[sIdx-1].id].every(Boolean))
        : state.progress[sec.id][uIdx-1];
      const isCurrent = !completed && prevCompleted;
      const isLocked = !completed && !isCurrent;

      let cls = 'completed';
      if (isCurrent) cls = 'current';
      if (isLocked) cls = 'locked';

      const btn = document.createElement('button');
      btn.className = `node ${cls}`;
      btn.disabled = isLocked;
      btn.innerHTML = isCurrent ? `${unit.nodeIcon}<span class="pulse-ring"></span>` : (completed ? '' : unit.nodeIcon);
      btn.onclick = () => isLocked ? null : startLesson(sec.id, uIdx);

      if (isCurrent) {
        const tag = document.createElement('div');
        tag.className = 'start-tag';
        tag.textContent = '시작';
        wrap.appendChild(tag);
      }

      wrap.appendChild(btn);
      nodes.appendChild(wrap);
    });

    path.appendChild(nodes);
  });
}

/* ============================================
   LESSON FLOW
============================================ */
function startLesson(sectionId, unitIdx) {
  const section = CURRICULUM.find(s => s.id === sectionId);
  const unit = section.units[unitIdx];
  state.currentSectionId = sectionId;
  state.currentUnitIdx = unitIdx;
  state.currentUnit = unit;
  state.currentQuestionIdx = 0;
  state.selectedChoice = null;
  state.isAnswered = false;
  state.lessonHeartsLost = 0;
  state.lessonGemsEarned = 0;
  state.correctCount = 0;

  document.getElementById('lesson').classList.add('active');
  renderQuestion();
}

function renderQuestion() {
  const unit = state.currentUnit;
  const q = unit.questions[state.currentQuestionIdx];
  const totalQ = unit.questions.length;

  document.getElementById('lessonProgress').style.width = `${(state.currentQuestionIdx/totalQ)*100}%`;
  document.getElementById('lessonHearts').textContent = state.hearts;

  state.selectedChoice = null;
  state.isAnswered = false;

  const body = document.getElementById('lessonBody');
  body.innerHTML = `
    <div class="question-prompt">${q.prompt}</div>
    <div class="question-text">${q.text}</div>
    <div class="choices">
      ${q.choices.map((c, i) => `
        <button class="choice" data-idx="${i}" onclick="selectChoice(${i})">
          <span class="choice-num">${i+1}</span>
          <span>${c}</span>
        </button>
      `).join('')}
    </div>
  `;

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  const btn = document.getElementById('checkBtn');
  btn.className = 'check-btn disabled';
  btn.textContent = '정답 확인';
}

function selectChoice(idx) {
  if (state.isAnswered) return;
  state.selectedChoice = idx;
  document.querySelectorAll('.choice').forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
  const btn = document.getElementById('checkBtn');
  btn.className = 'check-btn ready';
  btn.textContent = '정답 확인';
}

function handleCheck() {
  const btn = document.getElementById('checkBtn');
  if (btn.classList.contains('disabled')) return;

  if (!state.isAnswered) {
    // First click: check answer
    const q = state.currentUnit.questions[state.currentQuestionIdx];
    const isCorrect = state.selectedChoice === q.correct;
    state.isAnswered = true;

    document.querySelectorAll('.choice').forEach((el, i) => {
      el.disabled = true;
      if (i === q.correct) el.classList.add('correct');
      else if (i === state.selectedChoice) el.classList.add('wrong');
      el.classList.remove('selected');
    });

    const feedback = document.getElementById('feedback');
    if (isCorrect) {
      state.correctCount++;
      state.lessonGemsEarned += 2;
      feedback.className = 'feedback correct show';
      feedback.innerHTML = `
        <div class="feedback-title">⚾ 정답이에요!</div>
        <div class="feedback-explain">${q.explain}</div>
      `;
      btn.className = 'check-btn continue';
      btn.textContent = '계속하기';
    } else {
      state.hearts = Math.max(0, state.hearts - 1);
      state.lessonHeartsLost++;
      showHeartLoss();
      feedback.className = 'feedback wrong show';
      feedback.innerHTML = `
        <div class="feedback-title">💔 아쉬워요</div>
        <div class="feedback-explain">정답: <b>${q.choices[q.correct]}</b><br>${q.explain}</div>
      `;
      btn.className = 'check-btn continue wrong';
      btn.textContent = '계속하기';
    }
  } else {
    // Second click: continue
    state.currentQuestionIdx++;
    if (state.currentQuestionIdx >= state.currentUnit.questions.length) {
      finishLesson();
    } else {
      renderQuestion();
    }
  }
}

function showHeartLoss() {
  const el = document.createElement('div');
  el.className = 'heart-loss';
  el.textContent = '💔';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function finishLesson() {
  // Mark unit as completed if user reached the end with at least 1 heart
  if (state.hearts > 0) {
    state.progress[state.currentSectionId][state.currentUnitIdx] = true;
    state.gems += state.lessonGemsEarned;
    state.streak = Math.max(state.streak, 1);
  }

  const totalQ = state.currentUnit.questions.length;
  const accuracy = Math.round((state.correctCount / totalQ) * 100);

  const body = document.getElementById('lessonBody');
  body.innerHTML = `
    <div class="completion">
      <div class="trophy">🏆</div>
      <div class="completion-title">유닛 완료!</div>
      <div class="completion-sub">${state.currentUnit.title}</div>
      <div class="stats-grid">
        <div class="stat-card gold">
          <div class="stat-card-label">획득 젬</div>
          <div class="stat-card-value">+${state.lessonGemsEarned} 💎</div>
        </div>
        <div class="stat-card green">
          <div class="stat-card-label">정확도</div>
          <div class="stat-card-value">${accuracy}%</div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('lessonProgress').style.width = '100%';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  const btn = document.getElementById('checkBtn');
  btn.className = 'check-btn continue';
  btn.textContent = '홈으로';
  btn.onclick = () => {
    exitLesson();
    btn.onclick = handleCheck;
  };
}

function exitLesson() {
  document.getElementById('lesson').classList.remove('active');
  document.getElementById('checkBtn').onclick = handleCheck;
  renderHome();
}

/* ============================================
   INIT
============================================ */
renderHome();
</script>
